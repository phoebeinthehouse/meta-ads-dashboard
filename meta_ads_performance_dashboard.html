* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.dash { padding: 1rem 0; }
.section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
.person-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.person-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.person-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.person-sub { font-size: 12px; color: var(--color-text-secondary); }
.stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.stat-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
.stat-value { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
.stat-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 1px; }
.media-bar { margin-top: 8px; }
.media-label-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.bar-track { background: var(--color-background-secondary); border-radius: 4px; height: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; }
.tab-bar { display: flex; gap: 4px; margin-bottom: 1.5rem; }
.tab { padding: 6px 14px; border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); }
.tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; border-color: var(--color-border-secondary); }

function fmt(n) { return Math.round(n).toLocaleString(); }
function fmtD(n, d=2) { return Number(n).toFixed(d); }

function renderPersonCards() {
  const container = document.getElementById('personCards');
  const ranks = { clicks: [...personSummary].sort((a,b) => b.clicks - a.clicks).map(p=>p.person),
                  ctr: [...personSummary].sort((a,b) => b.ctr - a.ctr).map(p=>p.person),
                  cpc: [...personSummary].sort((a,b) => a.cpc - b.cpc).map(p=>p.person) };

  container.innerHTML = personSummary.map(p => {
    const rank = ranks[currentMetric].indexOf(p.person) + 1;
    const rankColors = ['#3266ad','#888780','#BA7517'];
    const vdo = personMedia.find(m => m.person === p.person && m.media === 'vdo');
    const img = personMedia.find(m => m.person === p.person && m.media === 'img');
    const totalClicks = (vdo?.clicks||0) + (img?.clicks||0);
    const vdoPct = totalClicks > 0 ? Math.round((vdo?.clicks||0)/totalClicks*100) : 0;

    return `<div class="person-card">
      <div class="person-header">
        <div class="avatar" style="background:${personBg[p.person]};color:${personText[p.person]};">${p.person[0]}</div>
        <div>
          <div class="person-name">${p.person}</div>
          <div class="person-sub">Rank #${rank} by ${currentMetric === 'clicks' ? 'clicks' : currentMetric === 'ctr' ? 'CTR' : 'CPC (lower=better)'}</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-label">Clicks</div>
          <div class="stat-value">${fmt(p.clicks)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">CTR</div>
          <div class="stat-value">${fmtD(p.ctr)}%</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">CPC</div>
          <div class="stat-value">₩${fmt(p.cpc)}</div>
        </div>
      </div>
      <div class="media-bar">
        <div class="media-label-row">
          <span>Video ${vdoPct}%</span><span>Image ${100-vdoPct}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${vdoPct}%; background:${personColors[p.person]};"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

const dates = [...new Set(daily.map(d=>d['일자']))].sort();

function getMetricLabel() {
  return currentMetric === 'clicks' ? 'Daily clicks' : currentMetric === 'ctr' ? 'Daily CTR (%)' : 'Daily CPC (₩)';
}

function getTrendData(person) {
  return dates.map(d => {
    const row = daily.find(r => r['일자'] === d && r.person === person);
    if (!row) return null;
    return currentMetric === 'clicks' ? row.clicks : currentMetric === 'ctr' ? row.ctr : row.cpc;
  });
}

    data: {
      labels: dates,
      datasets: ['Lina','Phoebe','Sarah'].map(p => ({
        label: p,
        data: getTrendData(p),
        borderColor: personColors[p],
        backgroundColor: personColors[p] + '22',
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 5,
        spanGaps: true,
        tension: 0.3,
        fill: false
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 11 }, color: '#888', maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, color: '#888' }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
}

function getMediaMetric(row) {
  return currentMetric === 'clicks' ? row.clicks : currentMetric === 'ctr' ? row.ctr : row.cpc;
}

function renderMediaChart() {
  const metricLabel = currentMetric === 'clicks' ? 'Clicks' : currentMetric === 'ctr' ? 'CTR (%)' : 'CPC (₩)';
  document.getElementById('mediaChartTitle').textContent = `Video vs image — ${metricLabel} by creator`;
  const persons = ['Lina','Phoebe','Sarah'];
  const vdoVals = persons.map(p => getMediaMetric(personMedia.find(m=>m.person===p&&m.media==='vdo')||{}));
  const imgVals = persons.map(p => getMediaMetric(personMedia.find(m=>m.person===p&&m.media==='img')||{}));
  const ctx = document.getElementById('mediaChart').getContext('2d');
  if (mediaChartObj) mediaChartObj.destroy();
  mediaChartObj = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: persons,
      datasets: [
        { label: 'Video', data: vdoVals, backgroundColor: persons.map(p => personColors[p]), borderRadius: 4, barPercentage: 0.45 },
        { label: 'Image', data: imgVals, backgroundColor: persons.map(p => personColors[p] + '66'), borderRadius: 4, barPercentage: 0.45 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 12 }, color: '#888' }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, color: '#888' }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
}

function renderAdTable() {
  let data = [...adPerf];
  if (currentPersonFilter !== 'All') data = data.filter(d => d.person === currentPersonFilter);
  data.sort((a,b) => currentMetric === 'cpc' ? a.cpc - b.cpc : b[currentMetric === 'clicks' ? 'clicks' : currentMetric] - a[currentMetric === 'clicks' ? 'clicks' : currentMetric]);
  const tbody = document.getElementById('adTableBody');
  tbody.innerHTML = data.map((row, i) => {
    const rankBg = i === 0 ? '#B5D4F4' : i === 1 ? '#D3D1C7' : i === 2 ? '#FAC775' : 'var(--color-background-secondary)';
    const rankTxt = i === 0 ? '#0C447C' : i === 1 ? '#444441' : i === 2 ? '#633806' : 'var(--color-text-secondary)';
    return `<tr>
      <td><span class="rank-badge" style="background:${rankBg};color:${rankTxt};">${i+1}</span></td>
      <td style="font-weight:500">${row.ad_name}</td>
      <td><span style="font-size:12px;color:${personText[row.person]};background:${personBg[row.person]};padding:2px 8px;border-radius:10px;">${row.person}</span></td>
      <td><span class="badge badge-${row.media}">${row.media === 'vdo' ? 'Video' : 'Image'}</span></td>
      <td style="color:var(--color-text-secondary);font-size:12px">${row.product}</td>
      <td style="text-align:right">${fmt(row.clicks)}</td>
      <td style="text-align:right">₩${fmt(row.spend)}</td>
      <td style="text-align:right">${fmtD(row.ctr)}%</td>
      <td style="text-align:right">₩${fmt(row.cpc)}</td>
    </tr>`;
  }).join('');
}

function switchMetric(metric) {
  currentMetric = metric;
  document.querySelectorAll('#metricTab .tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderPersonCards();
  renderTrendChart();
  renderMediaChart();
  renderAdTable();
}

function filterPerson(p) {
  currentPersonFilter = p;
  document.querySelectorAll('#personFilter .filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === p);
  });
  renderAdTable();
}

renderPersonCards();
renderTrendChart();
renderMediaChart();
renderAdTable();
</script>
